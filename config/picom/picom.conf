#################################
#           General              #
#################################

# blur-exclude = [
#   "class_g = 'Polybar'",
#   "window_type = 'dock'"
# ];

shadow = true;
shadow-radius = 50;
shadow-opacity = 0.35;
shadow-offset-x = -49;
shadow-offset-y = -47;
shadow-color = "#00020b";

frame-opacity = 1;
frame-opacity-for-same-colors = true;

inner-border-width = 1;
corner-radius = 5;

#################################
#             Blur               #
#################################

blur-method = "dual_kawase";
blur-background = true;
blur-background-frame = true;

#################################
#            Backend             #
#################################

backend = "glx";
vsync = true;
dithered-present = false;

detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

use-damage = true;
xrender-sync-fence = true;

log-level = "warn";

animations-for-open-window = true;
animations-for-transient-window = true;
animations-for-unmap-window = true;
animations-for-workspace-switch = true;

animations-for-override-redirect = false;
unredir-if-possible = false;


#################################
#             Rules              #
#################################

rules = (

#################################
#             THUNAR            #
#################################
{
    match = "class_g = 'Thunar'";
    blur-background = true;
    blur-background-frame = true;
    opacity = 1.0;
},

# {
#     match = "class_g = 'Polybar'";
#     blur-background = true;
#     blur-background-frame = true;
#     opacity = 0.8;
# },

{
  match = "class_g = 'Localsend'";
  blur-background = true;
  blur-background-frame = true;
  opacity = 1.0;
},

{
    match = "class_g = 'slop' || name = 'slop' || class_g = 'maim'";
    shadow = false;
    blur-background = false;
    opacity = 1.0;
    animations = ();
},


#################################
#              ROFI              #
#################################
{
    match = "class_g = 'Rofi' || name = 'rofi'";
    blur-background = true;
    blur-background-frame = true;
    corner-radius = 4;
    opacity = 1.0;
    blur-opacity = 1.0;
    animations = ({
        triggers = ["open", "show"];
        opacity = {
             curve = "linear";
             duration = 0.12;
             start = "0";
             end = "window-raw-opacity";
        };
        lur-opacity = {
            curve = "linear";
            duration = 0.1;
            delay = 0.1;
            start = "0";
            end = "window-raw-opacity";
        };
        offset-y = {
            curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
            duration = 0.15;
            start = "- window-height";
            end = "0";
        };
        shadow-offset-y = "offset-y";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.1;
            start = "window-raw-opacity-before";
            end = "0";
        };
        blur-opacity = 0;
        offset-y = {
            curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
            duration = 0.1;
            start = "0";
            end = "- window-height / 2";
        };
        shadow-offset-y = "offset-y";
    });
},

#################################
#        POPUP / MENU (Y)         #
#################################
{
    match = "window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'menu' || WM_TRANSIENT_FOR@";
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "0";
            end = "window-raw-opacity";
        };
        blur-opacity = {
            curve = "linear";
            duration = 0.08;
            delay = 0.1;
            start = "0";
            end = "window-raw-opacity";
        };
        offset-y = {
            curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
            duration = 0.12;
            start = "- window-height / 2";
            end = "0";
        };
        shadow-offset-y = "offset-y";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.1;
            start = "window-raw-opacity-before";
            end = "0";
        };
        blur-opacity = 0;
        offset-y = {
            curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
            duration = 0.1;
            start = "0";
            end = "- window-height / 3";
        };
        shadow-offset-y = "offset-y";
    });
    opacity = 0.8;
},

#################################
#        TOOLTIP (FADE)           #
#################################
{
    match = "window_type = 'tooltip'";
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.08;
            start = "0";
            end = "window-raw-opacity";
        };
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.06;
            start = "window-raw-opacity-before";
            end = "0";
        };
    });
    shadow = false;
    blur-background = false;
},

#################################
#      NOTIFICATION (TOP ↓)       #
#################################
{
    match = "window_type = 'notification'";
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.15;
            start = "0";
            end = "window-raw-opacity";
        };
        offset-y = {
            curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
            duration = 0.15;
            start = "- window-height";
            end = "0";
        };
        shadow-offset-y = "offset-y";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "0";
        };
        offset-y = {
            curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
            duration = 0.12;
            start = "0";
            end = "- window-height";
        };
        shadow-offset-y = "offset-y";
    });
},

#################################
#        DOCK / DESKTOP           #
#################################
{
    match = "window_type = 'dock' || window_type = 'desktop'";
    blur-background = true;
    corner-radius = 0;
},

#################################
#     FULLSCREEN / LOCK           #
#################################
{
    match = "class_g *= 'i3lock' || _NET_WM_STATE@[1] = '_NET_WM_STATE_FULLSCREEN'";
    shadow = false;
    corner-radius = 0;
}

);

#################################
#       Global Animations         #
#################################

animations = ({

#################################
#           CLOSE (X)             #
#################################
triggers = ["close", "hide"];
opacity = {
    curve = "linear";
    duration = 0.15;
    start = "window-raw-opacity-before";
    end = "0";
};
blur-opacity = 0;
shadow-opacity = "opacity";

offset-x = {
    curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
    duration = 0.15;
    start = "0";
    end = "window-width";
};

scale-x = {
    curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
    duration = 0.15;
    start = 1;
    end = 0.95;
};

scale-y = 1;
shadow-scale-x = "scale-x";
shadow-scale-y = 1;
shadow-offset-x = "offset-x";

}, {

#################################
#            OPEN (X)             #
#################################
triggers = ["open", "show"];
opacity = {
    curve = "linear";
    duration = 0.15;
    start = "0";
    end = "window-raw-opacity";
};
blur-opacity = {
    curve = "linear";
    duration = 0.1;
    delay = 0.15;
    start = "0";
    end = "window-raw-opacity";
};
shadow-opacity = "opacity";

offset-x = {
    curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
    duration = 0.15;
    start = "- window-width";
    end = "0";
};

scale-x = {
    curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
    duration = 0.15;
    start = 0.95;
    end = 1;
};

scale-y = 1;
shadow-scale-x = "scale-x";
shadow-scale-y = 1;
shadow-offset-x = "offset-x";

},

#################################
#     Workspace Switch (X)        #
#################################
{
    triggers = ["workspace-out"];
    offset-x = {
        curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
        duration = 0.15;
        start = "0";
        end = "- window-width / 2";
    };
    shadow-offset-x = "offset-x";
    blur-opacity = 0;
}, {
    triggers = ["workspace-out-inverse"];
    offset-x = {
        curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
        duration = 0.15;
        start = "0";
        end = "window-width / 2";
    };
    shadow-offset-x = "offset-x";
    blur-opacity = 0;
}, {
    triggers = ["workspace-in"];
    offset-x = {
        curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
        duration = 0.15;
        start = "window-width / 2";
        end = "0";
    };
    shadow-offset-x = "offset-x";
}, {
    triggers = ["workspace-in-inverse"];
    offset-x = {
        curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
        duration = 0.15;
        start = "- window-width / 2";
        end = "0";
    };
    shadow-offset-x = "offset-x";
}, {
    triggers = ["geometry"];
    preset = "geometry-change";
});

