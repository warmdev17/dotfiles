[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 10pt
interval = 1

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true
label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.crust}
label-focused = %index%
label-focused-foreground = ${colors.base}
label-focused-background = ${colors.blue}
label-focused-underline = ${colors.blue}
label-focused-padding = 1
label-urgent = %index%
label-urgent-foreground = ${colors.base}
label-urgent-background = ${colors.red}
label-urgent-padding = 1
label-unfocused = %index%
label-unfocused-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
ramp-volume-foreground = ${colors.red}
ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć”
ramp-volume-2 = ’Ć¦
ramp-volume-3 = ’Ć¦
ramp-volume-4 = ’Ć¦
ramp-volume-5 = ’Ć¦
ramp-volume-6 = "’Ć© "
ramp-volume-7 = "’Ć© "
ramp-volume-8 = "’Ć© "
ramp-volume-9 = "’Ć© "

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/battery]
type = internal/battery
full-at = 100
low-at = 20
battery = BAT1
adapter = ADP1
format = BAT
poll-interval = 1
format-charging = <animation-charging>  <label-charging>
format-foreground = ${colors.text}
format-discharging = <ramp-capacity>  <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = ’ēĆ %percentage%%
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
ramp-capacity-0-foreground = #f38ba8
ramp-capacity-1-foreground = #fab387
ramp-capacity-2-foreground = #f9e2af
ramp-capacity-3-foreground = #a6e3a1
ramp-capacity-4-foreground = #89b4fa
animation-charging-foreground = ${colors.green}
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750
animation-discharging-0 = ’ēĆ
animation-discharging-1 = ’ēü
animation-discharging-2 = ’ēé
animation-discharging-3 = ’ēā
animation-discharging-4 = ’ēä
animation-discharging-framerate = 500
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 1
format-prefix = "Ņ┐ģ  "
format-prefix-foreground = ${colors.peach}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 1
format-prefix = "¾░Źø "
format-prefix-foreground = ${colors.lavender}
format-foreground = ${colors.text}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %a-%d-%m-%Y

label = %date%
label-foreground = ${colors.mauve}

[module/tray]
type = internal/tray

format-margin = 8px
tray-spacing = 8px
interval = 1

[module/backlight]
type = internal/backlight
card = amdgpu_bl1
use-actual-brightness = true
poll-interval = 0.5

format = <label>
format-foreground = ${colors.text}
format-prefix = ’ā½
format-prefix-foreground = ${colors.teal}
label = " %percentage%%"

scroll-up = brightnessctl -d amdgpu_bl1 set +5%
scroll-down = brightnessctl -d amdgpu_bl1 set 5%-
click-left = brightnessctl -d amdgpu_bl1 set +10%
click-right = brightnessctl -d amdgpu_bl1 set 10%-


[module/scrcpy]
type = custom/script
exec = bash -lc '~/.config/polybar/scripts/scrcpy_status.sh'
interval = 1
tail = false
click-left = bash -lc 'pgrep -x scrcpy >/dev/null && pkill -x scrcpy || scrcpy --video-codec=h265 --max-size=1920 --max-fps=60 --no-audio --keyboard=uhid'
click-right = bash -lc 'pgrep -x scrcpy >/dev/null && pkill -x scrcpy || scrcpy -s 24d2ee04 --video-source=camera --camera-size=1920x1080 --camera-facing=front --v4l2-sink=/dev/video10 --no-playback'

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh --status
interval = 3
format = <label>
label = %output%
label-foreground = ${colors.text}

hook-0 = echo "%{F${colors.red}}’Ŗö%{F-} OFF"
hook-1 = echo "%{F${colors.mauve}}’Ŗö%{F-} Not connected"
hook-2 = echo "%{F${colors.teal}}’Ŗö%{F-} Connected"

click-left = ~/.config/polybar/scripts/bluetooth.sh --menu
click-right = ~/.config/polybar/scripts/bluetooth.sh --toggle


[module/timer]
type = custom/script
exec = ~/.config/polybar/scripts/polybar-timer.sh daemon
tail = true
interval = 1

; colors (optional)
format = <label>
label = %output%
; label-foreground = ${colors.primary}
; label-background = ${colors.bg}

; Controls
click-left  = ~/.local/bin/polybar-timer.sh toggle
click-right = ~/.local/bin/polybar-timer.sh reset
click-middle= ~/.local/bin/polybar-timer.sh preset work
scroll-up   = ~/.local/bin/polybar-timer.sh +60
scroll-down = ~/.local/bin/polybar-timer.sh -60

