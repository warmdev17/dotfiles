[global/wm]
include-file = ~/.config/polybar/module.ini
include-file = ~/.config/polybar/mocha.ini

[colors]
background = ${colors.base}
background-alt = ${colors.mantle}
foreground = ${colors.text}
primary = ${colors.blue}

[bar/example]
width = 100%
height = 22pt
radius = 0
monitor = eDP

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=13;2

modules-left = i3 xwindow
modules-right = scrcpy bluetooth pulseaudio memory cpu backlight battery date systray

cursor-click = pointer
cursor-scroll = ns-resize

tray-position = right

enable-ipc = true

wm-restack = i3
override-redirect = false
fixed-center = true


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
